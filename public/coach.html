<!DOCTYPE html>
<html lang="pt-BR" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuralOps — Coach Financeiro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&family=Onest:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--black:#03040A;--void:#06080F;--ink:#0A0E1A;--panel:#0E1420;--border:#1A2740;--text-dim:#3A5570;--text-mid:#5A7A9A;--text:#8AACCC;--text-bright:#C4DCEE;--white:#E8F4FF;--accent:#00D4FF;--accent2:#00FF88;--accent3:#FF6B35;--danger:#FF3366;--purple:#a855f7;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--text);font-family:'Onest',sans-serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.02) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;}
nav{background:rgba(3,4,10,.92);backdrop-filter:blur(24px);border-bottom:1px solid rgba(26,39,64,.8);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--white);text-decoration:none;}
.logo span{color:var(--purple);}
.btn{background:var(--purple);color:var(--white);border:none;padding:9px 20px;font-family:'DM Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;border-radius:4px;transition:all .2s;}
.btn:hover{background:#9333ea;}
.btn.ghost{background:transparent;color:var(--text-mid);border:1px solid var(--border);transition:all .2s;}
.btn.ghost:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.04);}
main{max-width:720px;margin:0 auto;padding:40px 24px 80px;}
.page-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--white);margin-bottom:8px;}
.page-sub{font-size:13px;color:var(--text-dim);margin-bottom:32px;line-height:1.7;}
.month-badge{display:inline-block;background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.3);color:var(--purple);padding:4px 14px;border-radius:20px;font-size:11px;margin-bottom:24px;}
.step{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:24px;margin-bottom:16px;transition:all .3s;}
.step.done{border-color:rgba(0,255,136,.3);background:rgba(0,255,136,.02);}
.step.active{border-color:rgba(168,85,247,.4);background:rgba(168,85,247,.03);}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--ink);border:1px solid var(--border);color:var(--text-dim);display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-right:12px;flex-shrink:0;}
.step.done .step-num{background:rgba(0,255,136,.15);border-color:var(--accent2);color:var(--accent2);}
.step.active .step-num{background:rgba(168,85,247,.15);border-color:var(--purple);color:var(--purple);}
.step-q{font-size:15px;color:var(--white);font-weight:600;margin-bottom:14px;display:flex;align-items:center;}
.step-ans{width:100%;background:var(--ink);border:1px solid var(--border);color:var(--white);padding:11px 14px;font-family:'DM Mono',monospace;font-size:13px;outline:none;border-radius:4px;transition:border-color .2s;resize:none;}
.step-ans:focus{border-color:var(--purple);}
.yn-btns{display:flex;gap:10px;}
.yn-btn{flex:1;padding:14px;background:var(--ink);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;cursor:pointer;border-radius:6px;transition:all .25s;text-align:center;font-weight:500;}
.yn-btn:hover{border-color:var(--accent);}
.yn-btn.sel-yes{background:rgba(0,255,136,.1);border-color:var(--accent2);color:var(--accent2);}
.yn-btn.sel-no{background:rgba(255,68,102,.1);border-color:var(--danger);color:var(--danger);}
.action-plan{background:linear-gradient(135deg,rgba(168,85,247,.08),rgba(0,212,255,.04));border:1px solid rgba(168,85,247,.2);border-radius:8px;padding:24px;margin-top:20px;}
.ap-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--white);margin-bottom:16px;}
.ap-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid rgba(30,45,66,.5);}
.ap-item:last-child{border-bottom:none;}
.ap-num{color:var(--purple);font-weight:700;flex-shrink:0;}
.ap-text{color:var(--text);font-size:13px;line-height:1.7;}
.prev-sessions{margin-top:32px;}
.prev-title{font-size:11px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;}
.session-card{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.session-month{font-size:13px;color:var(--white);}
.session-score{font-size:11px;color:var(--text-dim);}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--void);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--muted);}
</style>
</head>
<body>
<nav>
  <a href="/dashboard" class="logo">N<span>euralOps</span></a>
  <div style="display:flex;gap:8px;">
    <button class="btn ghost" onclick="window.location.href='/dashboard'">← Dashboard</button>
  </div>
</nav>
<main>
  <div class="page-title">🧠 Coach Financeiro</div>
  <div class="page-sub">Uma sessão de reflexão mensal com IA para alinhar objetivos, identificar obstáculos e criar um plano de ação concreto para o próximo mês.</div>
  <div class="month-badge" id="month-badge">Carregando...</div>

  <div id="questions-wrap"></div>

  <div id="result-wrap" style="display:none;"></div>
</main>
<script>
const token = localStorage.getItem('neuralops_token');
if (!token) window.location.href = '/login';

let questions = [], answers = {}, currentQ = 0, sessionDone = false;

const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

function api(path, opts = {}) {
  return fetch('/api' + path, { headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, ...opts }).then(r => r.json()).catch(() => null);
}

async function load() {
  const now = new Date();
  document.getElementById('month-badge').textContent = `📅 Sessão de ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;
  const r = await api('/coach/session');
  if (!r) return;
  questions = r.questions || [];
  if (r.session?.action_plan) { showResult(r.session.action_plan, r.session.ai_summary); return; }
  renderQuestion(0);
}

function renderQuestion(idx) {
  const wrap = document.getElementById('questions-wrap');
  if (idx >= questions.length) { submitSession(); return; }
  const q = questions[idx];
  wrap.innerHTML = questions.map((qq, i) => `
    <div class="step ${i < idx ? 'done' : i === idx ? 'active' : ''}">
      <div class="step-q">
        <span class="step-num">${i < idx ? '✓' : i+1}</span>
        ${qq.text}
      </div>
      ${i === idx ? (qq.type === 'yesno' ? `
        <div class="yn-btns">
          <button class="yn-btn ${answers[qq.id]==='yes'?'sel-yes':''}" onclick="setYN('${qq.id}','yes')">✓ Sim</button>
          <button class="yn-btn ${answers[qq.id]==='no'?'sel-no':''}" onclick="setYN('${qq.id}','no')">✗ Não</button>
        </div>
        ${answers[qq.id] ? `<div style="margin-top:14px;"><button class="btn" onclick="nextQ()" style="width:100%">Próxima →</button></div>` : ''}
      ` : `
        <textarea class="step-ans" id="ans-${qq.id}" rows="3" placeholder="Digite sua resposta..." onkeydown="if(event.ctrlKey&&event.key==='Enter')nextQ()">${answers[qq.id]||''}</textarea>
        <div style="margin-top:10px;display:flex;gap:8px;">
          ${idx>0?`<button class="btn ghost" onclick="prevQ()">← Voltar</button>`:''}
          <button class="btn" onclick="nextQ()" style="flex:1">${idx===questions.length-1?'Gerar Plano de Ação ✓':'Próxima →'}</button>
        </div>
      `) : `<div style="font-size:13px;color:${answers[qq.id]?'var(--accent2)':'var(--text-dim)'};">${answers[qq.id] ? '✓ ' + (answers[qq.id]==='yes'?'Sim':answers[qq.id]==='no'?'Não':answers[qq.id].substring(0,50)+'...') : 'Não respondida'}</div>`}
    </div>`).join('');
}

function setYN(id, val) { answers[id] = val; renderQuestion(currentQ); }

function nextQ() {
  const q = questions[currentQ];
  if (q.type !== 'yesno') {
    const el = document.getElementById('ans-' + q.id);
    if (el) answers[q.id] = el.value.trim();
  }
  if (!answers[q.id]) { return; }
  currentQ++;
  renderQuestion(currentQ);
}

function prevQ() { if (currentQ > 0) { currentQ--; renderQuestion(currentQ); } }

async function submitSession() {
  document.getElementById('questions-wrap').innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-dim);"><div style="font-size:32px;margin-bottom:16px;">🧠</div><div>A IA está gerando seu plano de ação...</div></div>`;
  const r = await api('/coach/session', { method: 'POST', body: JSON.stringify({ answers }) });
  if (r?.success) showResult(r.action_plan, r.summary);
}

function showResult(plan, summary) {
  document.getElementById('questions-wrap').innerHTML = '';
  const wrap = document.getElementById('result-wrap');
  wrap.style.display = 'block';
  const items = plan.split('\n').filter(l => l.trim()).map(l => l.replace(/^[\d\.\-\*]\s*/,'').trim()).filter(l => l.length > 5);
  wrap.innerHTML = `
    ${summary ? `<div style="background:rgba(168,85,247,.06);border:1px solid rgba(168,85,247,.2);border-radius:6px;padding:16px;margin-bottom:16px;"><div style="font-size:10px;color:var(--purple);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;">RESUMO DO MÊS</div><div style="font-size:13px;color:var(--text);line-height:1.7;">${summary}</div></div>` : ''}
    <div class="action-plan">
      <div class="ap-title">🎯 Plano de Ação — Próximo Mês</div>
      ${items.map((item, i) => `<div class="ap-item"><span class="ap-num">${i+1}.</span><span class="ap-text">${item}</span></div>`).join('')}
    </div>
    <div style="display:flex;gap:10px;margin-top:20px;">
      <button class="btn" onclick="window.location.href='/dashboard'" style="flex:1">← Voltar ao Dashboard</button>
      <button class="btn ghost" onclick="window.location.href='/certificado'" style="flex:1">🏆 Ver Certificado</button>
    </div>`;
}

load();
</script>
</body>
</html>
