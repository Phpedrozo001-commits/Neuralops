<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuralOps — Autenticação</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 400'%3E%3Cdefs%3E%3CradialGradient id='bg' cx='50%25' cy='50%25' r='60%25'%3E%3Cstop offset='0%25' stop-color='%230a1628'/%3E%3Cstop offset='100%25' stop-color='%2305060a'/%3E%3C/radialGradient%3E%3ClinearGradient id='ng' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23ffffff'/%3E%3Cstop offset='50%25' stop-color='%2300d4ff'/%3E%3Cstop offset='100%25' stop-color='%230077ff'/%3E%3C/linearGradient%3E%3Cfilter id='gl'%3E%3CfeGaussianBlur stdDeviation='8' result='b'/%3E%3CfeMerge%3E%3CfeMergeNode in='b'/%3E%3CfeMergeNode in='SourceGraphic'/%3E%3C/feMerge%3E%3C/filter%3E%3C/defs%3E%3Crect width='400' height='400' fill='url(%23bg)' rx='40'/%3E%3Cpath d='M108 280 L108 120 L148 120 L252 240 L252 120 L292 120 L292 280 L252 280 L148 160 L148 280 Z' fill='url(%23ng)' filter='url(%23gl)'/%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #05060a;
      --void: #080c12;
      --ink: #0d1420;
      --panel: #111827;
      --border: #1e2d42;
      --muted: #2a3d56;
      --text-dim: #4a6480;
      --text-mid: #7a9bb8;
      --text: #b8cfe0;
      --text-bright: #ddeeff;
      --white: #f0f8ff;
      --accent: #00d4ff;
      --accent2: #00ff88;
      --accent3: #ff6b35;
      --blue: #0077ff;
      --danger: #ff4466;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--black);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 400px;
    }

    .auth-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      backdrop-filter: blur(10px);
    }

    .logo {
      text-align: center;
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 30px;
    }

    .title {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--white);
    }

    .subtitle {
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px;
      background: var(--ink);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(0, 212, 255, 0.05);
    }

    input::placeholder {
      color: var(--text-dim);
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--accent), var(--blue));
      color: var(--black);
      border: none;
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .toggle {
      text-align: center;
      margin-top: 20px;
      color: var(--text-dim);
      font-size: 12px;
    }

    .toggle a {
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
    }

    .toggle a:hover {
      text-decoration: underline;
    }

    .error {
      background: rgba(255, 68, 102, 0.1);
      border: 1px solid var(--danger);
      color: #ff8899;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 12px;
      display: none;
    }

    .error.show {
      display: block;
    }

    .success {
      background: rgba(0, 255, 136, 0.1);
      border: 1px solid var(--accent2);
      color: #00ff88;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 12px;
      display: none;
    }

    .success.show {
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
      color: var(--accent);
      font-size: 12px;
    }

    .loading.show {
      display: block;
    }

    .password-requirements {
      background: rgba(0, 212, 255, 0.05);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 8px;
      margin-top: 15px;
      font-size: 11px;
      display: none;
    }

    .password-requirements.show {
      display: block;
    }

    .requirement {
      padding: 4px 0;
      color: var(--text-dim);
    }

    .requirement.met {
      color: var(--accent2);
    }

    .requirement:before {
      content: "○ ";
      margin-right: 8px;
    }

    .requirement.met:before {
      content: "✓ ";
      color: var(--accent2);
    }

    @media (max-width: 480px) {
      .auth-box {
        padding: 30px 20px;
      }

      .title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="auth-box">
      <div class="logo">NeuralOps</div>

      <div id="login-form">
        <div class="title">Entrar</div>
        <div class="subtitle">Acesse sua conta</div>

        <div class="error" id="login-error"></div>
        <div class="success" id="login-success"></div>

        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="seu@email.com" required>
          </div>

          <div class="form-group">
            <label for="login-password">Senha</label>
            <input type="password" id="login-password" placeholder="Sua senha" required>
          </div>

          <button type="submit" class="btn" id="login-btn">Entrar</button>
          <div class="loading" id="login-loading">Autenticando...</div>
        </form>

        <div class="toggle">
          Não tem conta? <a onclick="toggleForms()">Criar conta</a>
        </div>
      </div>

      <div id="register-form" style="display: none;">
        <div class="title">Criar Conta</div>
        <div class="subtitle">Comece grátis</div>

        <div class="error" id="register-error"></div>
        <div class="success" id="register-success"></div>

        <form onsubmit="handleRegister(event)">
          <div class="form-group">
            <label for="register-name">Nome</label>
            <input type="text" id="register-name" placeholder="Seu nome" required>
          </div>

          <div class="form-group">
            <label for="register-email">Email</label>
            <input type="email" id="register-email" placeholder="seu@email.com" required>
          </div>

          <div class="form-group">
            <label for="register-password">Senha</label>
            <input type="password" id="register-password" placeholder="Mínimo 8 caracteres" required oninput="checkPasswordStrength()">
            
            <div class="password-requirements" id="password-requirements">
              <div class="requirement" id="req-length">Mínimo 8 caracteres</div>
              <div class="requirement" id="req-upper">Letra maiúscula</div>
              <div class="requirement" id="req-lower">Letra minúscula</div>
              <div class="requirement" id="req-number">Número</div>
              <div class="requirement" id="req-special">Caractere especial (!@#$%^&*)</div>
            </div>
          </div>

          <button type="submit" class="btn" id="register-btn">Criar Conta</button>
          <div class="loading" id="register-loading">Criando conta...</div>
        </form>

        <div class="toggle">
          Já tem conta? <a onclick="toggleForms()">Entrar</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin + '/api';

    function toggleForms() {
      document.getElementById('login-form').style.display = 
        document.getElementById('login-form').style.display === 'none' ? 'block' : 'none';
      document.getElementById('register-form').style.display = 
        document.getElementById('register-form').style.display === 'none' ? 'block' : 'none';
      clearMessages();
    }

    function clearMessages() {
      document.querySelectorAll('.error, .success').forEach(el => el.classList.remove('show'));
    }

    function showError(formType, message) {
      const errorEl = document.getElementById(`${formType}-error`);
      errorEl.textContent = message;
      errorEl.classList.add('show');
    }

    function showSuccess(formType, message) {
      const successEl = document.getElementById(`${formType}-success`);
      successEl.textContent = message;
      successEl.classList.add('show');
    }

    async function handleLogin(event) {
      event.preventDefault();
      clearMessages();

      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('login-btn');
      const loading = document.getElementById('login-loading');

      btn.style.display = 'none';
      loading.classList.add('show');

      try {
        const response = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Erro ao fazer login');
        }

        localStorage.setItem('neuralops_token', data.token);
        showSuccess('login', 'Login realizado! Redirecionando...');
        setTimeout(() => {
          window.location.href = '/dashboard';
        }, 1000);
      } catch (error) {
        showError('login', error.message);
      } finally {
        btn.style.display = 'block';
        loading.classList.remove('show');
      }
    }

    async function handleRegister(event) {
      event.preventDefault();
      clearMessages();

      const name = document.getElementById('register-name').value;
      const email = document.getElementById('register-email').value;
      const password = document.getElementById('register-password').value;
      const btn = document.getElementById('register-btn');
      const loading = document.getElementById('register-loading');

      btn.style.display = 'none';
      loading.classList.add('show');

      try {
        const response = await fetch(`${API_URL}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Erro ao criar conta');
        }

        localStorage.setItem('neuralops_token', data.token);
        showSuccess('register', 'Conta criada! Redirecionando...');
        setTimeout(() => {
          window.location.href = '/dashboard';
        }, 1000);
      } catch (error) {
        showError('register', error.message);
      } finally {
        btn.style.display = 'block';
        loading.classList.remove('show');
      }
    }

    function checkPasswordStrength() {
      const password = document.getElementById('register-password').value;
      const requirements = document.getElementById('password-requirements');

      requirements.classList.add('show');

      const checks = {
        'req-length': password.length >= 8,
        'req-upper': /[A-Z]/.test(password),
        'req-lower': /[a-z]/.test(password),
        'req-number': /[0-9]/.test(password),
        'req-special': /[!@#$%^&*]/.test(password),
      };

      Object.entries(checks).forEach(([id, met]) => {
        const el = document.getElementById(id);
        if (met) {
          el.classList.add('met');
        } else {
          el.classList.remove('met');
        }
      });
    }
  </script>
</body>
</html>
