<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuralOps — Entrar</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 400'%3E%3Cdefs%3E%3CradialGradient id='bg' cx='50%25' cy='50%25' r='60%25'%3E%3Cstop offset='0%25' stop-color='%230a1628'/%3E%3Cstop offset='100%25' stop-color='%2305060a'/%3E%3C/radialGradient%3E%3ClinearGradient id='ng' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23ffffff'/%3E%3Cstop offset='50%25' stop-color='%2300d4ff'/%3E%3Cstop offset='100%25' stop-color='%230077ff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='400' height='400' fill='url(%23bg)' rx='40'/%3E%3Cpath d='M108 280 L108 120 L148 120 L252 240 L252 120 L292 120 L292 280 L252 280 L148 160 L148 280 Z' fill='url(%23ng)'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--black:#05060a;--void:#080c12;--ink:#0d1420;--panel:#111827;--border:#1e2d42;--text-dim:#4a6480;--text-mid:#7a9bb8;--text:#b8cfe0;--text-bright:#ddeeff;--white:#f0f8ff;--accent:#00d4ff;--accent2:#00ff88;--danger:#ff4466;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:auto;}
body{background:var(--black);color:var(--text);font-family:'DM Mono',monospace;font-size:15px;cursor:none;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.cursor{width:10px;height:10px;background:var(--accent);border-radius:50%;position:fixed;top:-5px;left:-5px;pointer-events:none;z-index:9999;mix-blend-mode:screen;will-change:transform;}
.cursor-ring{width:32px;height:32px;border:1.5px solid rgba(0,212,255,.45);border-radius:50%;position:fixed;top:-16px;left:-16px;pointer-events:none;z-index:9998;will-change:transform;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.025) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;}
.hero-orb{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(0,212,255,.08) 0%,transparent 70%);top:-150px;right:-150px;pointer-events:none;}
.hero-orb2{position:fixed;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(0,255,136,.05) 0%,transparent 70%);bottom:-100px;left:-100px;pointer-events:none;}

.card{background:var(--panel);border:1px solid var(--border);padding:40px 36px;width:100%;max-width:420px;position:relative;z-index:1;animation:slideUp .5s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.back-link{position:absolute;top:20px;left:20px;font-size:11px;color:var(--text-dim);text-decoration:none;transition:color .2s;letter-spacing:.5px;}
.back-link:hover{color:var(--accent);}
.logo{text-align:center;margin-bottom:32px;}
.logo-mark{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;color:var(--white);}
.logo-mark span{color:var(--accent);}
.logo-sub{font-size:13px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-top:6px;}

.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:28px;}
.tab{flex:1;padding:12px;text-align:center;font-size:14px;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;letter-spacing:.5px;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab:hover:not(.active){color:var(--text-mid);}

.form-group{margin-bottom:18px;}
.form-group label{display:block;font-size:11px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px;}
.form-group input{width:100%;background:var(--ink);border:1px solid var(--border);color:var(--white);padding:13px 14px;font-family:'DM Mono',monospace;font-size:14px;outline:none;transition:border-color .2s;}
.form-group input::placeholder{color:var(--text-dim);}
.form-group input:focus{border-color:var(--accent);}
.form-group input:disabled{opacity:.5;}

.err{font-size:12px;color:var(--danger);margin-top:6px;display:none;}
.err.show{display:block;}
.suc{font-size:12px;color:var(--accent2);margin-top:6px;display:none;}
.suc.show{display:block;}

.submit-btn{width:100%;background:var(--accent);color:var(--black);border:none;padding:14px;font-family:'DM Mono',monospace;font-size:15px;font-weight:500;cursor:pointer;letter-spacing:.5px;transition:all .25s;margin-top:8px;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);position:relative;overflow:hidden;}
.submit-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);transform:translateX(-100%);transition:transform .5s;}
.submit-btn:hover::after{transform:translateX(100%);}
.submit-btn:hover{background:var(--accent2);}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;}

.form-panel{display:none;}
.form-panel.active{display:block;}

@media(max-width:480px){
  body{cursor:auto;padding:16px;}
  .cursor,.cursor-ring{display:none;}
  .card{padding:28px 20px;}
  .logo-mark{font-size:28px;}
  .form-group input{padding:11px 12px;font-size:13px;}
  .submit-btn{font-size:14px;}
}
</style>
</head>
<body>
<div class="cursor"></div>
<div class="cursor-ring"></div>
<div class="hero-orb"></div>
<div class="hero-orb2"></div>

<div class="card">
  <a href="/" class="back-link">← Voltar</a>

  <div class="logo">
    <div class="logo-mark">N<span>euralOps</span></div>
    <div class="logo-sub">Agentes Autônomos de Negócios</div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="showTab('login',this)">Entrar</div>
    <div class="tab" onclick="showTab('register',this)">Criar Conta</div>
  </div>

  <!-- LOGIN -->
  <div class="form-panel active" id="panel-login">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="l-email" placeholder="seu@email.com" required>
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="l-pass" placeholder="Sua senha" required>
    </div>
    <div class="err" id="l-err"></div>
    <div class="suc" id="l-suc"></div>
    <button class="submit-btn" id="l-btn" onclick="doLogin()">ENTRAR</button>
  </div>

  <!-- REGISTER -->
  <div class="form-panel" id="panel-register">
    <div class="form-group">
      <label>Nome Completo</label>
      <input type="text" id="r-name" placeholder="Seu nome completo" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="r-email" placeholder="seu@email.com" required>
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="r-pass" placeholder="Mínimo 6 caracteres" required minlength="6">
    </div>
    <div class="form-group">
      <label>Confirmar Senha</label>
      <input type="password" id="r-pass2" placeholder="Confirme sua senha" required>
    </div>
    <div class="err" id="r-err"></div>
    <div class="suc" id="r-suc"></div>
    <button class="submit-btn" id="r-btn" onclick="doRegister()">CRIAR CONTA</button>
  </div>
</div>

<script>
// Cursor
const cursor=document.querySelector('.cursor'),cursorRing=document.querySelector('.cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.transform=`translate(${mx}px,${my}px)`;});
(function loop(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;cursorRing.style.transform=`translate(${rx}px,${ry}px)`;requestAnimationFrame(loop);})();
document.querySelectorAll('a,button,input,.tab').forEach(el=>{
  el.addEventListener('mouseenter',()=>cursor.style.transform=`translate(${mx}px,${my}px) scale(1.7)`);
  el.addEventListener('mouseleave',()=>cursor.style.transform=`translate(${mx}px,${my}px) scale(1)`);
});

// Redirect if already logged in
if(localStorage.getItem('neuralops_token')){window.location.href='/dashboard';}

function showTab(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.form-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
}

function showErr(id,msg){const e=document.getElementById(id);e.textContent=msg;e.className='err show';}
function showSuc(id,msg){const e=document.getElementById(id);e.textContent=msg;e.className='suc show';}
function clearAll(){document.querySelectorAll('.err,.suc').forEach(e=>e.className=e.className.replace('show',''));}

async function doLogin(){
  clearAll();
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  if(!email||!pass){showErr('l-err','Preencha todos os campos');return;}
  const btn=document.getElementById('l-btn');btn.disabled=true;btn.textContent='Entrando...';
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error||'Credenciais inválidas');
    localStorage.setItem('neuralops_token',d.token);
    localStorage.setItem('neuralops_user',JSON.stringify(d.user));
    showSuc('l-suc','✓ Login realizado! Redirecionando...');
    setTimeout(()=>window.location.href='/dashboard',800);
  }catch(e){showErr('l-err',e.message);}
  finally{btn.disabled=false;btn.textContent='ENTRAR';}
}

async function doRegister(){
  clearAll();
  const name=document.getElementById('r-name').value.trim();
  const email=document.getElementById('r-email').value.trim();
  const pass=document.getElementById('r-pass').value;
  const pass2=document.getElementById('r-pass2').value;
  if(!name||!email||!pass){showErr('r-err','Preencha todos os campos');return;}
  if(pass!==pass2){showErr('r-err','As senhas não correspondem');return;}
  if(pass.length<6){showErr('r-err','Senha deve ter no mínimo 6 caracteres');return;}
  const btn=document.getElementById('r-btn');btn.disabled=true;btn.textContent='Criando conta...';
  try{
    const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass,name})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error||'Erro ao criar conta');
    localStorage.setItem('neuralops_token',d.token);
    localStorage.setItem('neuralops_user',JSON.stringify(d.user));
    showSuc('r-suc','✓ Conta criada! Redirecionando...');
    setTimeout(()=>window.location.href='/dashboard',800);
  }catch(e){showErr('r-err',e.message);}
  finally{btn.disabled=false;btn.textContent='CRIAR CONTA';}
}

// Enter key support
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(document.getElementById('panel-login').classList.contains('active'))doLogin();
    else doRegister();
  }
});
</script>
</body>
</html>
